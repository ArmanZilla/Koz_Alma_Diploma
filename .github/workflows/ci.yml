name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Lint & Test ──────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/ --select=E,F,W --ignore=E501
        continue-on-error: true

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          ENVIRONMENT: dev
          OTP_DEV_MODE: "true"
          REDIS_URL: ""
          S3_ACCESS_KEY: ""
          S3_SECRET_KEY: ""

  # ── Docker Build ─────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t kozalma-backend ./backend

      - name: Verify image starts
        run: |
          docker run -d --name test-backend \
            -e ENVIRONMENT=dev \
            -e OTP_DEV_MODE=true \
            -e REDIS_URL="" \
            -p 8000:8000 \
            kozalma-backend
          sleep 10
          curl -f http://localhost:8000/health || echo "Health check failed (expected without models)"
          docker stop test-backend
