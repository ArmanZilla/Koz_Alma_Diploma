# Alembic configuration for KozAlma AI

[alembic]
# Path to migration scripts (relative to backend/)
script_location = alembic

# Template used for new revision files
# file_template = %%(rev)s_%%(slug)s

# Database URL — overridden at runtime from app.config
# sqlalchemy.url is set programmatically in env.py
sqlalchemy.url = sqlite+aiosqlite:///./koz_alma.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
